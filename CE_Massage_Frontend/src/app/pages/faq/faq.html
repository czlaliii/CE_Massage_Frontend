<section class="faq-section">
    <section class="faq-hero">
        <div class="faq-hero-title">
            <h1>{{ 'FAQ.TITLE' | translate }}</h1>
        </div>

        <div class="example-button-row">
            <div class="faq-ask">
                <div class="faq-ask-text">
                    <h3>{{ 'FAQ.CONTACT_BOX.TITLE' | translate }}</h3>
                    <p>{{ 'FAQ.CONTACT_BOX.DESCRIPTION' | translate }}</p>
                </div>

                <app-button
                    path="/about"
                    [buttonText]="'FAQ.CONTACT_BOX.BUTTON' | translate">
                </app-button>
            </div>
        </div>
    </section>

    <section class="faq-questions">
        <app-expansion
            [question]="'FAQ.QUESTIONS.QUESTION_1.QUESTION' | translate"
            [answer]="'FAQ.QUESTIONS.QUESTION_1.ANSWER' | translate">
        </app-expansion>

        <app-expansion
            [question]="'FAQ.QUESTIONS.QUESTION_2.QUESTION' | translate"
            [answer]="'FAQ.QUESTIONS.QUESTION_2.ANSWER' | translate">
        </app-expansion>

        <app-expansion
            [question]="'FAQ.QUESTIONS.QUESTION_3.QUESTION' | translate"
            [answer]="'FAQ.QUESTIONS.QUESTION_3.ANSWER' | translate">
        </app-expansion>

        <app-expansion
            [question]="'FAQ.QUESTIONS.QUESTION_4.QUESTION' | translate"
            [answer]="'FAQ.QUESTIONS.QUESTION_4.ANSWER' | translate">
        </app-expansion>

        <app-expansion
            [question]="'FAQ.QUESTIONS.QUESTION_5.QUESTION' | translate"
            [answer]="'FAQ.QUESTIONS.QUESTION_5.ANSWER' | translate">
        </app-expansion>

        <app-expansion
            [question]="'FAQ.QUESTIONS.QUESTION_6.QUESTION' | translate"
            [answer]="'FAQ.QUESTIONS.QUESTION_6.ANSWER' | translate">
        </app-expansion>
    </section>
</section>
