<section class="faq-section">
    <section class="faq-hero">
        <div class="faq-hero-title">
            <h1>Gyakran Ismételt Kérdések</h1>
        </div>
        <div class="example-button-row">
            <div class="faq-ask">
                <div class="faq-ask-text">
                    <h3>Nem találta meg a választ kérdésére?</h3>
                    <p>Lépjen kapcsolatba velünk!</p>
                </div>
                <app-button path="/about" buttonText="Kapcsolat"/>
            </div>
        </div>
</section>

    <section class="faq-questions">
        <app-expansion
            [question]="'Érkezhetek bejelentkezés nélkül? Ha nem, mennyivel korábban kell időpontot foglalnom?'"
            [answer]="'Bejelentkezés nélkül is érkezhetsz, azonban a szabad időpontok függvényében tudlak fogadni. A biztos időpont érdekében érdemes legalább 2 órával korábban foglalni, de akár 1–2 héttel előre is bejelentkezhetsz.'">
        </app-expansion>
        <app-expansion
            [question]="'Mikor kell fizetnem? Készpénzzel vagy kártyával lehet fizetni?'"
            [answer]="'A szolgáltatás díját a kezelést követően tudod rendezni, készpénzzel vagy bankkártyával.'">
        </app-expansion>
        <app-expansion
            [question]="'Mikor érkezzek a helyszínre? '"
            [answer]="'Kérjük, érkezz 10–15 perccel korábban. Késés esetén a kezelési időt sajnos nem tudjuk csúsztatni.'">
        </app-expansion>
        <app-expansion
            [question]="' Milyen ruházatot visel a masszőr? '"
            [answer]="'A kezelések során munkaruhát (pólót és nadrágot) viselek, a szolgáltatás minden esetben a szakmai kereteken belül zajlik.'">
        </app-expansion>
        <app-expansion
            [question]="'A terapeuta képzett és folyamatosan fejlesztett szakember? '"
            [answer]="'Igen. Svédmasszázs végzettséggel rendelkezem, emellett az 5 kontinens masszázs, az Expanse terápia és a Vibecodes terápia területén kezelői és oktatói képesítést szereztem az International Massage Federation of the 5 Continents szövetségnél. Számomra kiemelten fontos a folyamatos fejlődés, ezért rendszeresen részt veszek szakmai továbbképzéseken.'">
        </app-expansion>
        <app-expansion
            [question]="'Kérhetek extra, eltérő vagy erotikus tartalmú szolgáltatást? '"
            [answer]="`A kezelések kizárólag szakmai keretek között zajlanak, sem erotikus sem szexuális jellegű szolgáltatás nem elérhető. A teljes testes kezelés során a vendég alsóneműben vesz részt, a kényelmet és diszkréciót törölköző biztosítja.
            A szakmai keretektől eltérő kérés vagy utalás esetén a kezelést megszakítom, és megkérem a vendéget a távozásra.`">
        </app-expansion>
    </section>
</section>
