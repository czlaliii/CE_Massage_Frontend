<section class="hero">
    <div class="hero-overlay">
        <img
            [ngSrc]="imageUrl"
            alt="five-continents-massage-logo"
            [width]="width"
            [height]="height"
            priority
            class="hero-logo">
        <h1>{{ title }}</h1>
        <p class="hero-subtitle">
            {{ description }}
        </p>
    </div>
</section>
