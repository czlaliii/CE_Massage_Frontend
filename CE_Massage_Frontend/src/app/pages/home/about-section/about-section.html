<section id="about" class="about-section">
    <div class="about-content">
        <div class="about-image" scrollAnimate animation="fade-in">
            <img ngSrc="/images/home/about-photo1.jpg"
                width="400"
                height="500"
                alt="czinege_edina_erzsebet"
                priority>
        </div>
        <div class="about-text-wrapper">
            <div class="about-text" scrollAnimate animation="fade-in">
                <h1>{{ 'HOME.ABOUT.NAME' | translate }}</h1>
                <h3>{{ 'HOME.ABOUT.TITLE' | translate }}</h3>
                <br>
                <p>{{ 'HOME.ABOUT.DESCRIPTION_1' | translate }}</p>
                <p>{{ 'HOME.ABOUT.DESCRIPTION_2' | translate }}</p>
                <p>{{ 'HOME.ABOUT.DESCRIPTION_3' | translate }}</p>
            </div>
            <app-button path="/about" [buttonText]="'HOME.ABOUT.BUTTON' | translate" scrollAnimate animation="fade-in"/>
        </div>
    </div>
</section>
