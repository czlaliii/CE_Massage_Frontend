<section class="services-section">
    <img ngSrc="/images/home/bg2.jpg"
        fill class="services-bg"
        alt="services-bg"
        priority
    >
    <div class="services-content">
        <div class="services-list">
            <app-card
                [link]="'/services/five-continents'"
                [image]="{ src: '/images/home/five_continents.jpg', alt: 'five-continents-massage' }"
                title="5 kontinens masszázs"
                description="Egy holisztikus masszázstechnika, amely
                    ötvözi az 5 kontinens különböző masszázs- és gyógyító
                    hagyományait, hogy elősegítse a test, az elme és a lélek
                    harmóniáját."
            />
            <app-card
                [link]="'/services/expanse'"
                [image]="{ src: '/images/home/expanse.jpg', alt: 'expanse-therapy' }"
                title="Expanse terápia"
                description="Egy innovatív módszer, amely segít
                    felszabadítani a testben és az elmében rejlő blokkokat,
                    elősegítve ezzel a mélyebb relaxációt és a belső egyensúlyt."
            />
            <app-card
                [link]="'/services/vibecodes'"
                [image]="{ src: '/images/home/vibecodes.jpg', alt: 'vibecodes-therapy' }"
                title="Vibecodes kezelés"
                description="Egy rezgésalapú terápia, amely speciális
                    hangfrekvenciákat használ a test energiarendszerének
                    harmonizálására és a gyógyulás elősegítésére."
            />
        </div>
    </div>
</section>
